<!DOCTYPE html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		
		<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;700&family=Manrope:wght@300;400;600;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
		
		<script id="tailwind-config">
			tailwind.config = {
				darkMode: "class",
				theme: {
					extend: {
						colors: {
							"inverse-surface": "#e2e2e5",
							"on-primary": "#133155",
							"outline": "#8e9199",
							"on-tertiary-container": "#7ba3ed",
							"on-primary-container": "#8aa4cf",
							"outline-variant": "#43474e",
							"surface-container-lowest": "#0c0e10",
							"secondary-container": "#ff7e21",
							"on-surface-variant": "#c4c6cf",
							"surface-container-high": "#282a2c",
							"secondary": "#ff7e21",
							"surface-container-low": "#1a1c1e",
							"surface-dim": "#121416",
							"on-secondary": "#000000",
							"on-surface": "#e2e2e5",
							"tertiary": "#abc7ff",
							"primary": "#adc8f5",
							"background": "#121416",
							"surface": "#121416",
							"primary-container": "#1e3a5f",
						},
						fontFamily: {
							"headline": ["DM Serif Display", "serif"],
							"body": ["Manrope", "sans-serif"],
							"label": ["Inter", "sans-serif"]
						},
						borderRadius: {"DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px"},
					},
				},
			}
		</script>
		
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="selection:bg-secondary selection:text-on-secondary">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
